name: Accessibility Issue
description: Report an accessibility problem (VoiceOver, keyboard navigation, Dynamic Type, etc.)
labels: ["accessibility", "bug"]
body:
  - type: markdown
    attributes:
      value: |
        Accessibility is a core priority for Perspective Studio. Thank you for helping us improve it.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the accessibility barrier you encountered.
    validations:
      required: true

  - type: dropdown
    id: assistive-tech
    attributes:
      label: Assistive Technology
      options:
        - VoiceOver
        - Voice Control
        - Switch Control
        - Keyboard Navigation
        - Dynamic Type
        - Reduce Motion
        - High Contrast
        - Other
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Enable VoiceOver
        2. Navigate to...
        3. Notice that...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should the accessible experience be?
    validations:
      required: true

  - type: input
    id: macos-version
    attributes:
      label: macOS Version
      placeholder: e.g. macOS 26.0
    validations:
      required: true
