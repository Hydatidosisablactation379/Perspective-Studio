name: Bug Report
description: Report a bug in Perspective Studio
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the details below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Open the app
        2. Go to...
        3. Click on...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: input
    id: macos-version
    attributes:
      label: macOS Version
      placeholder: e.g. macOS 26.0
    validations:
      required: true

  - type: input
    id: mac-model
    attributes:
      label: Mac Model and RAM
      placeholder: e.g. MacBook Pro M4, 16GB
    validations:
      required: true

  - type: input
    id: model-name
    attributes:
      label: Model Being Used (if applicable)
      placeholder: e.g. mlx-community/Llama-3.2-3B-Instruct-4bit

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or Logs
      description: Add any screenshots, error messages, or console logs that help explain the issue.

  - type: checkboxes
    id: accessibility
    attributes:
      label: Accessibility
      options:
        - label: This issue affects VoiceOver or other assistive technology
